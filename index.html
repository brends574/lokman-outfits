<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lokman Store</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#0f172a;
    color:white;
}

/* NAVBAR */
nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 30px;
    background:#020617;
}

.logo{
    font-size:20px;
    font-weight:bold;
}

.search{
    width:40%;
    padding:10px;
    border-radius:20px;
    border:none;
}

/* HERO */
.hero{
    background:linear-gradient(45deg,#1e3a8a,#06b6d4);
    padding:50px;
    text-align:center;
}

.hero h1{
    font-size:40px;
}

.btn{
    background:#22c55e;
    padding:10px 20px;
    border:none;
    border-radius:10px;
    color:white;
    cursor:pointer;
}

/* CATEGORIES */
.categories{
    display:flex;
    justify-content:center;
    gap:30px;
    padding:30px;
}

.cat{
    text-align:center;
}

.cat img{
    width:80px;
    height:80px;
    border-radius:50%;
}

/* PRODUCTS */
.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:#1e293b;
    padding:15px;
    border-radius:15px;
    text-align:center;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
}

.card img{
    width:100%;
    border-radius:10px;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
    <div class="logo">🛒 Lokman</div>
    <input class="search" placeholder="ابحث عن منتج...">
    <div>🛒 0</div>
</nav>

<!-- HERO -->
<div class="hero">
    <h1>🔥 عروض قوية</h1>
    <button class="btn">تسوق الآن</button>
</div>

<!-- CATEGORIES -->
<div class="categories">
    <div class="cat">
        <img src="https://i.imgur.com/8Km9tLL.png">
        <p>ملابس</p>
    </div>
    <div class="cat">
        <img src="https://i.imgur.com/OdL0XPt.png">
        <p>رياضة</p>
    </div>
    <div class="cat">
        <img src="https://i.imgur.com/9yG3K5R.png">
        <p>إلكترونيات</p>
    </div>
</div>

<!-- PRODUCTS -->
<div class="products">

<div class="card">
    <img src="https://i.imgur.com/1.png">
    <h3>T-shirt black</h3>
    <p>2500 DA</p>
    <button class="btn">شراء</button>
</div>

<div class="card">
    <img src="https://i.imgur.com/2.png">
    <h3>Hoodie white</h3>
    <p>4000 DA</p>
    <button class="btn">شراء</button>
</div>

<div class="card">
    <img src="https://i.imgur.com/3.png">
    <h3>Cap</h3>
    <p>1500 DA</p>
    <button class="btn">شراء</button>
</div>

</div>

</body>
</html>
