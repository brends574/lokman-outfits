<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>LUXE STORE</title>

<style>
body {margin:0;font-family:Arial;background:#fff;}

nav {
display:flex;
justify-content:space-between;
padding:15px;
border-bottom:1px solid #eee;
}

.products {
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.card {
border:1px solid #ddd;
padding:10px;
text-align:center;
}

.card img {
width:100%;
height:200px;
object-fit:cover;
}

button {
background:black;
color:white;
padding:10px;
border:none;
cursor:pointer;
}
</style>

</head>

<body>

<nav>
<div><b>LUXE STORE</b></div>
<div>🛒 (<span id="count">0</span>)</div>
</nav>

<div style="text-align:center;padding:40px;">
<h2>🔥 أفضل ملابس</h2>
<button onclick="goShop()">تسوق الآن</button>
</div>

<div id="products" class="products"></div>

<script>

let products = [
{name:"T-Shirt",price:3500,img:"https://picsum.photos/300?1"},
{name:"Hoodie",price:6000,img:"https://picsum.photos/300?2"}
];

let cart=[];

function showProducts(){
let html="";
for(let i=0;i<products.length;i++){
html+=
<div class="card">
<img src="${products[i].img}">
<h3>${products[i].name}</h3>
<p>${products[i].price} DA</p>
<button onclick="add(${i})">شراء</button>
</div>
;
}
document.getElementById("products").innerHTML=html;
}

function goShop(){
document.getElementById("products").scrollIntoView();
}

function add(i){
cart.push(products[i]);
document.getElementById("count").innerText=cart.length;
}

// أهم حاجة
showProducts();

</script>

</body>
</html>
