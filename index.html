<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LOKMAN</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#00555A;
    color:white;
}

/* NAV */
nav{
    display:flex;
    justify-content:space-between;
    padding:20px 40px;
}

nav h1{
    color:#C3FDB8;
}

/* HERO */
.hero{
    text-align:center;
    padding:60px 20px;
}

.hero h2{
    font-size:35px;
}

.btn{
    background:#C3FDB8;
    color:#00555A;
    padding:12px 25px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    box-shadow:0 0 15px #C3FDB8;
}

/* PRODUCTS */
.products{
    background:white;
    color:black;
    padding:50px;
    border-radius:40px 40px 0 0;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:25px;
}

.card{
    background:#f1f1f1;
    padding:15px;
    border-radius:20px;
    text-align:center;
    transition:0.3s;
}

.card img{
    width:100%;
    border-radius:15px;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-10px);
}

.card:hover img{
    transform:scale(1.05);
}

/* BUTTON BUY */
.buy{
    margin-top:10px;
    background:#00555A;
    color:white;
    padding:10px;
    border:none;
    border-radius:20px;
    cursor:pointer;
}

/* WHATSAPP FLOAT */
.whatsapp{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25D366;
    padding:15px;
    border-radius:50%;
    text-decoration:none;
    color:white;
    font-size:20px;
}
</style>

</head>
<body>

<nav>
    <h1>LOKMAN</h1>
</nav>

<section class="hero">
    <h2>Premium Quality You Can Feel</h2>
    <p>Luxury Clothing Brand</p>
    <button class="btn">Shop Now</button>
</section>

<section class="products">

<h2 style="text-align:center;">Collection</h2>

<div class="grid">

<div class="card">
<img src="https://via.placeholder.com/300">
<h3>T-Shirt Black</h3>
<p>$25</p>
<button class="buy" onclick="buy('T-Shirt Black')">Buy</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/300">
<h3>T-Shirt White</h3>
<p>$30</p>
<button class="buy" onclick="buy('T-Shirt White')">Buy</button>
</div>

</div>

</section>

<a class="whatsapp" href="https://wa.me/213554751016">💬</a>

<script>
function buy(product){
    let number = "213554751016";
    let message = "سلام، نحب نشري " + product;
    let url = "https://wa.me/" + number + "?text=" + encodeURIComponent(message);
    window.open(url, '_blank');
}
</script>

</body>
</html>
