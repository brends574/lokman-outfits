<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>متجر ملابسي</title>

<style>
body {font-family: Arial; margin:0; background:#fff;}
header {text-align:center; padding:15px; font-size:22px; border-bottom:1px solid #eee;}

.products {
display:flex;
flex-wrap:wrap;
justify-content:center;
padding:20px;
}

.card {
border:1px solid #ddd;
margin:10px;
padding:10px;
width:200px;
border-radius:10px;
text-align:center;
}

.card img {
width:100%;
height:150px;
object-fit:cover;
}

button {
background:black;
color:white;
border:none;
padding:8px;
border-radius:6px;
cursor:pointer;
}
</style>

</head>

<body>

<header>🛍️ متجر ملابسي</header>

<div class="products">

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>T-Shirt</h3>
<p>3500 DA</p>
<button>شراء</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Hoodie</h3>
<p>6000 DA</p>
<button>شراء</button>
</div>

</div>

</body>
</html>
